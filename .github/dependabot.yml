version: 2
updates:
  # npm パッケージ（セキュリティアップデートのみ）
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0 # セキュリティアラートのPRのみ作成

  # GitHub Actions（セキュリティアップデートのみ）
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0 # セキュリティアラートのPRのみ作成
