name: CI
# トリガー設定
on:
  pull_request:
    branches:
      - staging
      - main # 必要に応じてリポジトリを追加
    types:
      - opened
      - synchronize
      - reopened
# 権限の最小化（デフォルトで全権限を無効化）
permissions: {}
# 並行実行の制御
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  Linters:
    name: Linters
    runs-on: ubuntu-latest
    permissions:
      contents: read        # リポジトリのチェックアウト
      pull-requests: write  # reviewdogのPRコメント
      checks: write         # reviewdogのレポート
    steps:
      # リポジトリのチェックアウト
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # 全履歴を取得（変更ファイルの検出用）

      # 依存関係のインストール
      - name: Install dependencies
        run: npm install

      # 変更されたファイルの検出（オプション）
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@2d756ea4c53f7f6b397767d8723b3a10a9f35bf2 # v44
        with:
          files: |
            src/**/*.{js,ts,scss}
            htdocs/**/*.html

      # JavaScript/TypeScriptのリント
      - name: Run ESLint
        if: steps.changed-files.outputs.any_changed == 'true'
        run: npm run lint
        continue-on-error: true # エラーでも続行

      # ESLintのレポート生成
      - name: ESLint Report
        uses: reviewdog/action-eslint@556a3fdaf8b4201d4d74d406013386aa4f7dab96 # v1
        with:
          github_token: ${{ secrets.github_token }}
          reporter: github-pr-review
          eslint_flags: "src/**/*.{js,ts}"
          fail_level: error

      # SCSSのリント
      - name: Run Stylelint
        if: steps.changed-files.outputs.any_changed == 'true'
        run: npm run lint:css
        continue-on-error: true

      # Stylelintのレポート生成
      - name: Stylelint Report
        uses: reviewdog/action-stylelint@dd2b435cc6a7c82705307a9dee740c9bbaa10411 # v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          stylelint_input: "src/**/*.scss"
          fail_level: error

      # HTMLのリント
      - name: Run Markuplint
        if: steps.changed-files.outputs.any_changed == 'true'
        run: sh ./markuplint-check.sh
        continue-on-error: false #リポート機能が無いのでエラーの場合警告を出す


